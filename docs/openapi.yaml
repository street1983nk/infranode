  /api/v1/cities/{slug}/traffic:
    get:
      tags: [cities]
      summary: Baustellen und Verkehrsmeldungen je Stadt (Autobahn-API)
      x-summary-en: Roadworks and traffic warnings per city (Autobahn API)
      description: >-
        Baustellen (roadworks) und Verkehrswarnungen (warnings) im Umfeld einer
        Stadt aus der Autobahn-API im kanonischen Envelope. Die Meldungen werden
        per Bounding-Box um die Stadt-Koordinaten gefiltert, data enthält die
        passenden Einträge. Flächendeckend: jeder der 84 Städte sind die nahen
        Autobahnen kuratiert zugeordnet (datengetrieben aus der Autobahn-API),
        eine Stadt ohne aktuelle Meldung antwortet ehrlich mit no_data.
        Stau/Verkehrslage:
        jede Verkehrswarnung trägt zusätzlich ein congestion-Feld (level
        stau/stockend/dicht/unspezifisch aus dem DATEX-abnormalTrafficType,
        delay_minutes = Reisezeitverlust, blocked), und payload.congestion_summary
        verdichtet die Stau-Lage je Stadt (count/stau/stockend/blocked/
        max_delay_minutes; null wenn keine Stau-Meldung). Weitere Sonderfälle:
        deaktivierte Quelle liefert 200 mit source_status="disabled"; toter
        Upstream ohne Cache liefert 503 mit Hint auf GET /api/v1/health.
      x-description-en: >-
        Roadworks and traffic warnings around a city from the Autobahn API in the
        canonical envelope. Items are filtered by a bounding box around the
        city's coordinates; data contains the matching entries. Full coverage:
        each of the 84 cities has its nearby motorways curated (data-driven from
        the Autobahn API); a city with no current message honestly responds with
        no_data. Congestion: each traffic warning additionally carries a
        congestion field (level stau/stockend/dicht/unspezifisch derived from the
        DATEX abnormalTrafficType, delay_minutes = travel-time loss, blocked), and
        payload.congestion_summary aggregates the congestion situation per city
        (count/stau/stockend/blocked/max_delay_minutes; null if no congestion
        message). Other special cases: a disabled source returns 200 with
        source_status="disabled"; a dead upstream with no cache returns 503 with a
        hint to GET /api/v1/health.
      operationId: getCityTraffic
      parameters:
        - name: slug
          in: path
          required: true
          schema:
