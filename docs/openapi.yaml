      summary: Baumkataster je Stadt (kommunaler WFS, Tier A)
      x-summary-en: Street-tree cadastre per city (municipal WFS, Tier A)
      description: >-
        Das städtische Baumkataster (Straßenbäume) aus dem kommunalen WFS, je Baum
        Punkt plus Attribute (Art, Pflanzjahr, Höhe, Straße, Bezirk). Kataster sind
        sehr groß: die Antwort ist eine gedeckelte Stichprobe (count = ausgelieferte
        Bäume, nicht der Gesamtbestand). Teilabdeckung (kommunal, nur Städte mit
        verifiziertem offenem WFS, aktuell Berlin, DL-DE/Zero 2.0); andere Städte
        antworten mit 200 source_status="not_covered" + meta.covered_cities.
        Deaktiviert -> 200 source_status="disabled".
      x-description-en: >-
        A city's street-tree cadastre from the municipal WFS, each tree as a point
        plus attributes (species, planting year, height, street, district). Registers
        are very large: the response is a capped sample (count = returned trees, not
        the full stock). Partial coverage (municipal, only cities with a verified
        open WFS, currently Berlin, DL-DE/Zero 2.0); other cities return 200
        source_status="not_covered" + meta.covered_cities. Disabled -> 200
        source_status="disabled".
      operationId: getCityTreeCadastre
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
