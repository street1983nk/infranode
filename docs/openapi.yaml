        PVcalc). PVGIS computes any EU coordinate, so all cities are covered. A
        multi-year climatological average at the city centre, normalized to a
        1 kWp system at the optimal tilt: annual_yield_kwh_kwp (annual yield
        kWh/kWp), annual_irradiation_kwh_m2 (global irradiation kWh/m²),
        optimal_slope_deg/optimal_azimuth_deg and 12 monthly values (monthly).
