        (Bauland = Wohnen/Misch/Gewerbe, ohne Wald/Wasser/Landwirtschaft):
        brw_median_eur_m2, brw_min_eur_m2, brw_max_eur_m2, zone_count, der
        Bewertungsstichtag und der bbox_radius_deg (Umkreis um das Stadtzentrum).
        BORIS ist pro Bundesland föderiert (je Land ein WFS). Toggle aus -> 200
        source_status="disabled"; Bundesland ohne BORIS-WFS -> 200
        source_status="not_covered" (mit covered_cities); abgedeckt, aber kein
        Snapshot -> 200 source_status="not_ingested".
