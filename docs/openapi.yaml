openapi: 3.1.0
info:
  title: InfraNode API
  version: 1.0.0
  description: >-
    Open-Source-Proxy-REST-API für normalisierte offene Daten deutscher
    Großstädte. Bekannt sind 84 Städte über 100.000 Einwohner, davon 28
    Kern-Städte mit voller Quellen-Abdeckung; weitere Städte werden über
    AGS- und geobasierte Quellen bedient. Jede Antwort folgt demselben
    kanonischen Envelope (data/meta/attribution) mit Lizenz-Tag und ehrlichem
    source_status (ok/no_data/disabled/not_covered). Teilabgedeckte Endpunkte
    (flood, webcams, traffic, road-events) liefern für eine nicht-abgedeckte
    Stadt 200 source_status="not_covered" + meta.covered_cities statt eines
    leeren "ok"; die Abdeckung listet die Seite /abdeckung. Pfade tragen den vollen
    /api/v1-Prefix, damit die ausgelieferte Spec driftfrei zu den live
    registrierten Routen bleibt.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: http://localhost
    description: Lokaler Caddy-Ingress (Docker Compose)
tags:
  - name: meta
    description: Meta- und Diagnose-Routen (Health, Ping, Source-Status, Spec)
  - name: cities
    description: Stadt-Register und normalisierte Stadt-Stammdaten
  - name: compare
    description: Multi-City-Vergleich einer Ressource über mehrere Städte
  - name: Live
    description: >-
      Getrennte Live-Kategorie unter /api/v1/live. Minutenfrische bzw.
      quasi-live Quellen mit eigenem Envelope-Kennzeichen: meta.as_of
      (Datenstand) und meta.refresh_seconds (Kadenz). Re-exponiert zusätzlich
      bestehende Live-Endpunkte (air, air-uba, water-level, traffic, webcams,
      flood); deren Altpfade unter /api/v1/cities bleiben als Deprecation-Alias
      erhalten (kein Breaking Change).
paths:
  /api/v1/health:
    get:
      tags: [meta]
      summary: Liveness und Readiness der App prüfen
      x-summary-en: Check app liveness and readiness
      description: >-
        Liefert den App-Status und die Redis-Erreichbarkeit. Gedacht für
        Uptime-Monitore und Load-Balancer-Probes: antwortet mit 200, sobald die
        App bereit ist, sonst mit einem Fehlerstatus.
      x-description-en: >-
        Returns the app status and Redis reachability. Designed for uptime
        monitors and load-balancer probes: responds with 200 once the app is
        ready, otherwise with an error status.
      operationId: getHealth
      responses:
        "200":
          description: App läuft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /api/v1/ping:
    get:
      tags: [meta]
      summary: Einfacher Ping mit Correlation-ID
      x-summary-en: Simple ping with correlation ID
      description: >-
        Gibt eine Pong-Antwort inklusive correlation_id zurück und schreibt eine
        strukturierte JSON-Log-Zeile mit request_id. Nützlich, um die
        Request-Verkettung im Logging zu prüfen.
      x-description-en: >-
        Returns a pong response including a correlation_id and writes a
        structured JSON log line with a request_id. Useful for verifying request
        tracing in the logs.
      operationId: getPing
      responses:
        "200":
          description: Pong
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ping"
          headers:
            X-Request-ID:
              description: Pro Request generierte/durchgereichte Correlation-ID
              schema:
                type: string
  /api/v1/echo:
    get:
      tags: [meta]
      summary: Integer-Query zurückgeben (Validierungs-Demo)
      x-summary-en: Echo an integer query (validation demo)
      description: >-
        Gibt den übergebenen Integer-Query-Parameter zurück. Ein nicht-ganzzahliger
        Wert löst den einheitlichen 400-Fehler-Envelope aus und zeigt so die
        Eingabevalidierung.
      x-description-en: >-
        Returns the integer query parameter you pass in. A non-integer value
        triggers the unified 400 error envelope, demonstrating input validation.
      operationId: getEcho
      parameters:
        - name: n
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Echo
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Ungültiger Query-Parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/v1/_boom:
    get:
      tags: [meta]
      summary: Erzwungener Upstream-Fehler (Demo)
      x-summary-en: Forced upstream failure (demo)
      description: >-
        Existiert nur zum Testen des zentralen Fehler-Mappings. Liefert immer
        einen 503-Fehler-Envelope.
      x-description-en: >-
        Exists only to test the central error mapping. Always returns a 503
        error envelope.
      operationId: getBoom
      responses:
        "503":
          description: Simulierter Upstream-Ausfall
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/v1/sources:
    get:
      tags: [meta]
      summary: Status aller Upstream-Quellen
      x-summary-en: Status of all upstream sources
      description: >-
        Listet je bekannter Quelle den enabled-Zustand (aus den Settings) und
        den Circuit-Breaker-Zustand (CLOSED/OPEN/HALF_OPEN). So ist auf einen
        Blick sichtbar, welche Quelle gerade liefert und welche pausiert ist.
      x-description-en: >-
        Lists each known source with its enabled state (from settings) and its
        circuit-breaker state (CLOSED/OPEN/HALF_OPEN). Shows at a glance which
        source is currently serving and which is paused.
      operationId: getSources
      responses:
        "200":
          description: Liste der Quellen-Status
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SourceStatus"
                  meta:
                    $ref: "#/components/schemas/Meta"
        "304":
          $ref: "#/components/responses/NotModified"
      parameters:
        - in: header
          name: If-None-Match
          required: false
          schema: { type: string }
          description: >-
            Conditional GET. Stimmt der Wert mit dem aktuellen ETag überein,
            antwortet der Server mit 304 Not Modified ohne Body.
          x-description-en: >-
            Conditional GET. If the value matches the current ETag, the server
            responds with 304 Not Modified and no body.
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, default: 50 }
          description: >-
            Seitengröße. Wird auf MAX_LIMIT (200) gedeckelt: zu große Werte
            liefern eine 200er-Seite mit 200 Einträgen statt eines Fehlers.
          x-description-en: >-
            Page size. Capped at MAX_LIMIT (200): larger values return a 200 page
            of 200 items instead of an error.
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
          description: Ein zu großer Offset liefert eine leere Seite (200), nie 500.
          x-description-en: An offset past the end returns an empty page (200), never 500.
        - in: query
          name: sort
          schema: { type: string, enum: [source, enabled, license] }
          description: >-
            Nur die gelisteten Felder sind erlaubt; ein unbekanntes Feld wird mit
            400 (invalid_request) abgewiesen, bevor es ausgewertet wird.
          x-description-en: >-
            Only the listed fields are allowed; an unknown field is rejected with
            400 (invalid_request) before it is evaluated.
        - in: query
          name: order
          schema: { type: string, enum: [asc, desc], default: asc }
  /api/v1/compare:
    get:
      tags: [compare]
      summary: Eine Ressource über mehrere Städte vergleichen
      x-summary-en: Compare one resource across multiple cities
      description: >-
        Vergleicht EINE Ressource (resource) über mehrere Städte (cities,
        kommasepariert) in einer einzigen Antwort. Jede Stadt trägt einen eigenen
        source_status (ok/disabled/no_data/error/not_found); eine fehlende oder
        tote Stadt-Quelle führt nicht zu einem Gesamt-5xx, sondern wird pro Stadt
        ehrlich ausgewiesen. resource wird gegen eine feste Liste geprüft
        (unbekannt -> 400). Das Ergebnis ist paginierbar (page/limit/offset/sort).
      x-description-en: >-
        Compares ONE resource across multiple cities (comma-separated) in a
        single response. Each city carries its own source_status
        (ok/disabled/no_data/error/not_found); a missing or dead city source does
        not cause an overall 5xx but is reported honestly per city. resource is
        checked against a fixed list (unknown -> 400). The result is paginated
        (page/limit/offset/sort).
      operationId: compareCities
      parameters:
        - in: query
          name: cities
          required: true
          schema: { type: string }
          example: berlin,koeln,hamburg
          description: Kommaseparierte Stadt-Slugs (auf MAX_CITIES begrenzt).
          x-description-en: Comma-separated city slugs (limited to MAX_CITIES).
        - in: query
          name: resource
          required: true
          schema: { type: string, enum: [weather, air] }
          description: >-
            Zu vergleichende Ressource (aus der festen Liste); unbekannt -> 400
            invalid_request.
          x-description-en: >-
            Resource to compare (from the fixed list); unknown -> 400
            invalid_request.
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
        - in: query
          name: sort
          schema: { type: string, enum: [city, source_status] }
        - in: query
          name: order
          schema: { type: string, enum: [asc, desc], default: asc }
        - in: header
          name: If-None-Match
          required: false
          schema: { type: string }
          description: >-
            Conditional GET; If-None-Match == ETag -> 304 Not Modified ohne Body.
          x-description-en: >-
            Conditional GET; If-None-Match == ETag -> 304 Not Modified with no body.
      responses:
        "200":
          description: Vergleichsliste mit per-Stadt source_status
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required: [city, source_status]
                      properties:
                        city: { type: string }
                        data: { type: object, nullable: true }
                        source_status:
                          type: string
                          enum: [ok, disabled, no_data, error, not_found]
                  meta:
                    $ref: "#/components/schemas/Meta"
        "304":
          $ref: "#/components/responses/NotModified"
        "400":
          description: Unbekannte resource oder leeres cities (invalid_request)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/v1/openapi.yaml:
    get:
      tags: [meta]
      summary: Diese OpenAPI-Spec als YAML
      x-summary-en: This OpenAPI spec as YAML
      description: >-
        Liefert die handgepflegte Spec als application/yaml. FastAPI serviert
        intern nur /openapi.json; diese Route stellt die stabile YAML-Variante
        bereit.
      x-description-en: >-
        Returns the hand-maintained spec as application/yaml. FastAPI internally
        serves only /openapi.json; this route provides the stable YAML variant.
      operationId: getOpenapiYaml
      responses:
        "200":
          description: Die Spec als YAML
          content:
            application/yaml:
              schema:
                type: string
  /api/v1/cities:
    get:
      tags: [cities]
      summary: Alle bekannten Städte auflisten
      x-summary-en: List all known cities
      description: >-
        Listet die Einträge des Stadt-Registers: 84 deutsche Großstädte über
        100.000 Einwohner, davon 28 Kern-Städte mit voller Quellen-Abdeckung.
        Jeder Eintrag trägt den Slug, den du als {slug}-Pfadparameter in allen
        weiteren Endpunkten verwendest.
      x-description-en: >-
        Lists the entries of the city register: 84 German cities with more than
        100,000 inhabitants, 28 of them core cities with full source coverage.
        Each entry carries the slug you use as the {slug} path parameter in all
        other endpoints.
      operationId: getCities
      responses:
        "200":
          description: Stadt-Liste
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  meta:
                    $ref: "#/components/schemas/Meta"
  /api/v1/cities/{slug}:
    get:
      tags: [cities]
      summary: Eine Stadt aus dem Register holen
      x-summary-en: Get a single city from the register
      description: >-
        Liefert den Register-Eintrag zur Stadt mit dem angegebenen {slug}. Ein
        unbekannter Slug löst den 404-Fehler-Envelope aus, dessen Hint auf die
        Stadt-Liste verweist.
      x-description-en: >-
        Returns the register entry for the city with the given {slug}. An unknown
        slug triggers the 404 error envelope whose hint points to the city list.
      operationId: getCity
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stadt-Eintrag
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Unbekannte Stadt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/v1/cities/{slug}/base:
    get:
      tags: [cities]
      summary: Stadt-Stammdaten aus Wikidata
      x-summary-en: City master data from Wikidata
      description: >-
        Liefert Einwohnerzahl, Fläche und Geo-Koordinaten einer Stadt aus
        Wikidata im kanonischen Envelope mit Attribution und Lizenz-Tag. Ist die
        Quelle deaktiviert, antwortet die Route mit 200, data=null und
        meta.source_status="disabled" (nie 5xx). Ist der Upstream tot und liegt
        kein zwischengespeicherter Wert vor, kommt 503 mit einem Hint auf
        GET /api/v1/health.
      x-description-en: >-
        Returns a city's population, area and geo coordinates from Wikidata in
        the canonical envelope with attribution and license tag. If the source
        is disabled, the route responds with 200, data=null and
        meta.source_status="disabled" (never 5xx). If the upstream is down and no
        cached value exists, it returns 503 with a hint pointing to
        GET /api/v1/health.
      operationId: getCityBase
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: >-
            Stammdaten-Envelope. data ist der CanonicalRecord oder null, wenn die
            Quelle deaktiviert ist (meta.source_status="disabled").
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    oneOf:
                      - $ref: "#/components/schemas/CanonicalRecord"
                      - type: "null"
                  meta:
                    allOf:
                      - $ref: "#/components/schemas/Meta"
                    description: >-
                      meta trägt zusätzlich source_status ("ok"|"disabled") und
                      auf dem ok-Pfad cache_status (HIT/MISS/STALE/STALE-ON-ERROR).
        "404":
          description: Unbekannte Stadt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Quelle vorübergehend nicht erreichbar (kein Cache)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/v1/cities/{slug}/air:
    get:
      tags: [cities]
      summary: Luftqualität je Stadt (OpenAQ)
      x-summary-en: Air quality per city (OpenAQ)
      description: >-
        Aktuelle Luftqualitäts-Messwerte einer Stadt aus OpenAQ im kanonischen
        Envelope. Die Schadstoff-Messwerte stehen in data, Quelle und
        source_status in meta. Werte sind live (kein Zwischenbestand).
        Sonderfälle: deaktivierte Quelle liefert 200 mit data=null und
        source_status="disabled"; toter Upstream ohne Cache liefert 503 mit Hint
        auf GET /api/v1/health.
      x-description-en: >-
        Current air-quality readings for a city from OpenAQ in the canonical
        envelope. The pollutant readings are in data, source and source_status in
        meta. Values are live (no intermediate store). Special cases: a disabled
        source returns 200 with data=null and source_status="disabled"; a dead
        upstream with no cache returns 503 with a hint to GET /api/v1/health.
      operationId: getCityAir
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Luftqualitäts-Envelope (CanonicalRecord oder null)
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    oneOf:
                      - $ref: "#/components/schemas/CanonicalRecord"
                      - type: "null"
                  meta:
                    $ref: "#/components/schemas/Meta"
        "404":
          description: Unbekannte Stadt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Quelle vorübergehend nicht erreichbar (kein Cache)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/v1/cities/{slug}/weather:
    get:
      tags: [cities]
      summary: Wetter je Stadt (DWD über Bright Sky)
      x-summary-en: Weather per city (DWD via Bright Sky)
      description: >-
        Aktuelle Wetter-Messwerte einer Stadt vom Deutschen Wetterdienst (über
        Bright Sky) im kanonischen Envelope. data trägt die Messwerte,
        attribution den GeoNutzV-Bearbeitungshinweis (modified=true).
        Sonderfälle: deaktivierte Quelle liefert 200 mit
        source_status="disabled"; toter Upstream ohne Cache liefert 503 mit Hint
        auf GET /api/v1/health.
      x-description-en: >-
        Current weather readings for a city from the German Weather Service (DWD,
        via Bright Sky) in the canonical envelope. data holds the readings,
        attribution carries the GeoNutzV modification notice (modified=true).
        Special cases: a disabled source returns 200 with
        source_status="disabled"; a dead upstream with no cache returns 503 with
        a hint to GET /api/v1/health.
      operationId: getCityWeather
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Wetter-Envelope (CanonicalRecord oder null)
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    oneOf:
                      - $ref: "#/components/schemas/CanonicalRecord"
                      - type: "null"
                  meta:
                    $ref: "#/components/schemas/Meta"
        "404":
          description: Unbekannte Stadt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Quelle vorübergehend nicht erreichbar (kein Cache)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/v1/cities/{slug}/pois:
    get:
      tags: [cities]
      summary: POIs je Stadt, nach Typ gefiltert (OSM/Overpass, Tier B)
      x-summary-en: POIs per city, filtered by type (OSM/Overpass, Tier B)
      description: >-
        Liefert POIs einer Stadt aus OpenStreetMap (über Overpass) im
        kanonischen Envelope, gefiltert nach dem Query-Parameter type. Der Typ
        wird gegen eine feste Liste geprüft; ein unbekannter Typ löst 422 aus
        (kein roher Input in die Overpass-Query). Tier B (copyleft).
        Deaktiviert -> 200 source_status="disabled".
      x-description-en: >-
        Returns a city's POIs from OpenStreetMap (via Overpass) in the canonical
        envelope, filtered by the type query parameter. The type is checked
        against a fixed list; an unknown type triggers 422 (no raw input reaches
        the Overpass query). Tier B (copyleft). Disabled -> 200
        source_status="disabled".
      operationId: getCityPois
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: true
          description: POI-Typ aus der erlaubten Liste (z.B. hospital, school, pharmacy).
          x-description-en: POI type from the allowed list (e.g. hospital, school, pharmacy).
          schema:
            type: string
      responses:
        "200":
          description: POI-Envelope (CanonicalRecord oder null)
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    oneOf:
                      - $ref: "#/components/schemas/CanonicalRecord"
                      - type: "null"
                  meta:
                    $ref: "#/components/schemas/Meta"
        "404":
          description: Unbekannte Stadt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: Unbekannter POI-Typ (nicht in der Whitelist)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Quelle vorübergehend nicht erreichbar (kein Cache)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/v1/cities/{slug}/traffic:
    get:
      tags: [cities]
      summary: Baustellen und Verkehrsmeldungen je Stadt (Autobahn-API)
      x-summary-en: Roadworks and traffic warnings per city (Autobahn API)
      description: >-
        Baustellen (roadworks) und Verkehrswarnungen (warnings) im Umfeld einer
        Stadt aus der Autobahn-API im kanonischen Envelope. Die Meldungen werden
        per Bounding-Box um die Stadt-Koordinaten gefiltert, data enthält die
        passenden Einträge. Teilabdeckung (kuratierte Autobahnen je Stadt): nur
        berlin, hamburg, koeln, muenchen liefern Daten. Andere registrierte Städte
        antworten ehrlich mit 200 source_status="not_covered", data=null und
        meta.covered_cities (Liste der abgedeckten Städte), klar unterscheidbar
        von no_data (abgedeckt, aber gerade keine Meldung). Weitere Sonderfälle:
        deaktivierte Quelle liefert 200 mit source_status="disabled"; toter
        Upstream ohne Cache liefert 503 mit Hint auf GET /api/v1/health.
      x-description-en: >-
        Roadworks and traffic warnings around a city from the Autobahn API in the
        canonical envelope. Items are filtered by a bounding box around the
        city's coordinates; data contains the matching entries. Partial coverage
        (curated motorways per city): only berlin, hamburg, koeln, muenchen return
        data. Other registered cities honestly respond with 200
        source_status="not_covered", data=null and meta.covered_cities (the list
        of covered cities), clearly distinct from no_data (covered, but currently
        no message). Other special cases: a disabled source returns 200 with
        source_status="disabled"; a dead upstream with no cache returns 503 with a
        hint to GET /api/v1/health.
      operationId: getCityTraffic
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verkehrs-Envelope (CanonicalRecord oder null)
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    oneOf:
                      - $ref: "#/components/schemas/CanonicalRecord"
                      - type: "null"
                  meta:
                    $ref: "#/components/schemas/Meta"
        "404":
          description: Unbekannte Stadt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Quelle vorübergehend nicht erreichbar (kein Cache)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/v1/cities/{slug}/transit:
    get:
      tags: [cities]
      summary: ÖPNV-Haltestellen je Stadt (DELFI und HVV GTFS)
      x-summary-en: Public-transit stops per city (DELFI and HVV GTFS)
      description: >-
