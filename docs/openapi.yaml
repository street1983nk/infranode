  /api/v1/cities/{slug}/solar:
    get:
      tags: [cities]
      summary: Solar-Einstrahlung + PV-Ertrag je Stadt (PVGIS, Tier A)
      x-summary-en: Solar irradiation + PV yield per city (PVGIS, Tier A)
      description: >-
        Solar-Potenzial je Stadt aus der keylosen PVGIS-Rechen-API (EU JRC,
        PVcalc). PVGIS rechnet jede EU-Koordinate, daher sind alle Städte
        abgedeckt. Klimatologisches Mehrjahresmittel am Stadtzentrum, normiert auf
        1 kWp bei optimalem Neigungswinkel: annual_yield_kwh_kwp (Jahresertrag
        kWh/kWp), annual_irradiation_kwh_m2 (Globalstrahlung kWh/m²),
        optimal_slope_deg/optimal_azimuth_deg und 12 Monatswerte (monthly).
        system_loss_pct ist der konfigurierte (gewollte) Systemverlust aus
        Verkabelung/Wechselrichter/Verschmutzung (an PVGIS übergebener
        loss-Parameter, i.d.R. 14 %), NICHT die Gesamt-Performance-Differenz;
        diese steht separat als total_performance_delta_pct (PVGIS l_total, inkl.
        Temperatur-/Einstrahlungs-/Winkel-Effekten, negativ = Gesamtminderung).
        Kein Messzeitpunkt, daher observed_at=null; der Bezugszeitraum steht als
        period_start/period_end. Tier A (EU-Reuse-Policy). Toggle aus -> 200
        source_status="disabled"; toter Upstream ohne Cache -> 503 mit Hint.
      x-description-en: >-
