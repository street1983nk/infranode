        information system) per city, aggregated into a building-land metric
        (building land = residential/mixed/commercial, excluding
        forest/water/farmland): brw_median_eur_m2, brw_min_eur_m2,
        brw_max_eur_m2, zone_count, the valuation reference date and
        bbox_radius_deg (radius around the city centre). BORIS is federated per
        federal state (one WFS per state). Toggle off -> 200
        source_status="disabled"; state without a BORIS WFS -> 200
        source_status="not_covered" (with covered_cities); covered but no
        snapshot -> 200 source_status="not_ingested".
