components:
  headers:
    ETag:
      description: >-
        Stabiler Entity-Tag des Response-Bodys (sha256-basiert). Nur auf
        erfolgreichen GET-Reads (200) gesetzt, nie auf Fehler-Envelopes/503.
      schema: { type: string }
    CacheControl:
      description: >-
        Cache-Control je Ressource ("public, max-age=<ttl>"). TTL aus der
        serverseitigen CACHE_TTL-Map (z.B. wikidata 86400 s, dwd 1800 s, uba
        600 s, default 300 s).
      schema: { type: string }
    RateLimitLimit:
      description: Erlaubte Requests im aktuellen Fenster (IETF RateLimit-Header).
      schema: { type: integer }
    RateLimitRemaining:
      description: Verbleibende Requests im aktuellen Fenster.
      schema: { type: integer }
    RateLimitReset:
      description: Sekunden bis zum Reset des Fensters.
      schema: { type: integer }
  responses:
    NotModified:
      description: >-
        Not Modified. If-None-Match stimmte mit dem aktuellen ETag überein;
        es wird kein Body geliefert (ETag + Cache-Control bleiben erhalten).
      headers:
        ETag:
          $ref: "#/components/headers/ETag"
        Cache-Control:
          $ref: "#/components/headers/CacheControl"
  schemas:
    Meta:
      type: object
      properties:
        correlation_id:
          type: string
          nullable: true
        source_status:
          type: string
          description: >-
            Ehrlicher Quellen-Status der Antwort. "ok" (Daten vorhanden),
            "no_data" (Quelle erreichbar/abgedeckt, aber gerade keine Daten),
            "disabled" (Quelle per Toggle aus), "not_ingested" (kein Snapshot),
            "not_covered" (Stadt ist für diesen teilabgedeckten Endpunkt
            strukturell nicht abgedeckt; data=null, siehe covered_cities). Klar
            unterscheidbar vom 404 (Stadt unbekannt).
          enum: [ok, no_data, disabled, not_ingested, not_covered]
        cache_status:
          type: string
          nullable: true
          description: Cache-Herkunft (hit/miss/stale), sofern die Route cacht.
        covered_cities:
          type: array
          items:
            type: string
          description: >-
            Nur bei source_status="not_covered": die Stadt-Slugs, die dieser
            teilabgedeckte Endpunkt tatsächlich bedient (z. B. flood, webcams,
            traffic, road-events).
    Health:
      type: object
      required: [status, version, redis]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: "1.0.0"
        redis:
          type: boolean
          description: true wenn Redis erreichbar (Ping erfolgreich)
    Ping:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [pong]
          properties:
            pong:
              type: boolean
              example: true
        meta:
          $ref: "#/components/schemas/Meta"
    SourceStatus:
      type: object
      required: [source, enabled, breaker_state]
      properties:
        source:
          type: string
          example: wikidata
        enabled:
          type: boolean
        breaker_state:
          type: string
          enum: [CLOSED, OPEN, HALF_OPEN]
    Attribution:
      type: object
      required: [text]
      properties:
        text:
          type: string
          example: Wikidata
        license_url:
          type: string
          nullable: true
        modified:
          type: boolean
          default: false
    CityBaseDataPayload:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [city_base]
          default: city_base
        population:
          type: integer
          nullable: true
        area_km2:
          type: number
          nullable: true
    AirQualityPayload:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [air_quality]
          default: air_quality
        station_id:
          type: string
          nullable: true
        pm10:
          type: number
          nullable: true
        no2:
          type: number
          nullable: true
        pm25:
          type: number
          nullable: true
        o3:
          type: number
          nullable: true
        so2:
          type: number
          nullable: true
    WeatherPayload:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [weather]
          default: weather
        station_id:
          type: string
          nullable: true
        temperature_c:
          type: number
          nullable: true
        humidity:
          type: number
          nullable: true
        wind_speed:
          type: number
          nullable: true
        condition:
          type: string
          nullable: true
    PoiPayload:
      type: object
      required: [kind, poi_type, count]
      properties:
        kind:
          type: string
          enum: [poi]
          default: poi
        poi_type:
          type: string
        count:
          type: integer
        items:
          type: array
          items:
            type: object
    TrafficEventPayload:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [traffic_event]
          default: traffic_event
        station_id:
          type: string
          nullable: true
        roadworks:
          type: array
          items:
            type: object
        warnings:
          type: array
          items:
            type: object
    RoadEventPayload:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [road_event]
          default: road_event
        city_source:
          type: string
          nullable: true
        events:
          type: array
          items:
            type: object
    WebcamPayload:
      type: object
      required: [kind, count]
      properties:
        kind:
          type: string
          enum: [webcam]
          default: webcam
        count:
          type: integer
        webcams:
          type: array
          items:
            type: object
    TransitStopPayload:
      type: object
      required: [kind, stop_id, stop_name]
      properties:
        kind:
          type: string
          enum: [transit_stop]
          default: transit_stop
        stop_id:
          type: string
        stop_name:
          type: string
        location_type:
          type: integer
          nullable: true
        parent_station:
          type: string
          nullable: true
        platform_code:
          type: string
          nullable: true
        wheelchair_boarding:
          type: integer
          nullable: true
    ChargingStationPayload:
      type: object
      required: [kind, count]
      properties:
        kind:
          type: string
          enum: [charging_station]
          default: charging_station
        count:
          type: integer
        stations:
          type: array
          items:
            type: object
    WaterLevelPayload:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [water_level]
          default: water_level
        station:
          type: string
          nullable: true
        water:
          type: string
          nullable: true
        value:
          type: number
          nullable: true
        unit:
          type: string
          nullable: true
    FloodWarningPayload:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [flood_warning]
          default: flood_warning
        warnings:
          type: array
          items:
            type: object
        stand:
          type: string
          nullable: true
    PollenUvPayload:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [pollen_uv]
          default: pollen_uv
        region_id:
          type: integer
          nullable: true
        region_name:
          type: string
          nullable: true
        pollen:
          type: object
        uv_index:
          type: number
          nullable: true
    DemographicsPayload:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [demographics]
          default: demographics
        population:
          type: integer
          nullable: true
        households:
          type: integer
          nullable: true
        buildings:
          type: integer
          nullable: true
        rent_avg:
          type: number
          nullable: true
        reference_year:
          type: integer
          nullable: true
        series:
          type: array
          items:
            type: object
    EnergyAssetPayload:
      type: object
      required: [kind, count]
      properties:
        kind:
          type: string
          enum: [energy_asset]
          default: energy_asset
        count:
          type: integer
        by_type:
          type: object
        assets:
          type: array
          items:
            type: object
    AdminBoundaryPayload:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [admin_boundary]
          default: admin_boundary
        ags:
          type: string
          nullable: true
        gen_name:
          type: string
          nullable: true
        area_km2:
          type: number
          nullable: true
        reference_year:
          type: integer
          nullable: true
    ElectionResultPayload:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [election_result]
          default: election_result
        election:
          type: string
          nullable: true
        granularity:
          type: string
          default: teilweise
        area_name:
          type: string
          nullable: true
        turnout:
          type: string
          nullable: true
          description: >-
            Wahlbeteiligung in Prozent als String mit Dezimal-Komma (kerg2,
            Zeile Gruppenname "Wählende", Spalte Prozent), z.B. "82,5122".
        results:
          type: array
          items:
            type: object
    HolidayPayload:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [holiday]
          default: holiday
        state:
          type: string
          nullable: true
        year:
          type: integer
          nullable: true
        holidays:
          type: array
          items:
            type: object
        school_holidays:
          type: array
          items:
            type: object
    HospitalPayload:
      type: object
      required: [kind, count]
      properties:
        kind:
          type: string
          enum: [hospital]
          default: hospital
        count:
          type: integer
        hospitals:
          type: array
          items:
            type: object
        reference_date:
          type: string
          nullable: true
    IcuCapacityPayload:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [icu_capacity]
          default: icu_capacity
        kreis_id:
          type: string
          nullable: true
        kreis_name:
          type: string
          nullable: true
        beds_free:
          type: integer
          nullable: true
        beds_occupied:
          type: integer
          nullable: true
        hospitals:
          type: array
          description: >-
            Klinikscharfe Live-Status-Einschätzungen (DIVI, Tier C) je
            Krankenhaus-Standort (bezeichnung, ort, letzte_meldung,
            status_high_care, status_ecmo). Die Live-API liefert keine
            numerische Belegung mehr (beds_free/beds_occupied bleiben null
            und tragen nur das Tier-A-Kreis-Aggregat).
          items:
            type: object
        datum:
          type: string
          nullable: true
    CanonicalRecord:
      type: object
      required: [city_slug, retrieved_at, source, license_id, license_tier, schema_version, record_id, content_hash, attribution, payload]
      properties:
        city_slug:
          type: string
        schema_version:
          type: integer
          default: 1
        record_id:
          type: string
          description: Deterministischer Primärschlüssel (computed, immer im Dump).
        content_hash:
          type: string
          description: Deterministischer Dedup-Hash der Nutzdaten (computed, immer im Dump).
        ags:
          type: string
          nullable: true
          description: Amtlicher Gemeindeschlüssel als Join-Key (kein Pfadsegment).
        wikidata_qid:
          type: string
          nullable: true
          description: Wikidata-QID als Join-Key.
        geo:
          nullable: true
          type: object
          properties:
            lat:
              type: number
            lon:
              type: number
        observed_at:
          type: string
          format: date-time
          nullable: true
        retrieved_at:
          type: string
          format: date-time
        source:
          type: string
          enum: [wikidata, openaq, dwd, osm, autobahn, bnetza, uba, delfi, hvv, pegelonline, hochwasser, dwd_pollen, genesis, zensus, mastr, bkg, bundeswahl, divi, feiertage, berlin_viz, hamburg_baustellen, koeln_verkehr, muenchen_baustellen, mobidata_bw]
        license_id:
          type: string
          enum: [cc0, cc_by_4_0, dl_de_by_2_0, dl_de_zero_2_0, geonutzv, odbl, cc_by_sa_4_0, unknown]
        license_tier:
          type: string
          enum: [A, B, C]
        attribution:
          $ref: "#/components/schemas/Attribution"
        payload:
          oneOf:
            - $ref: "#/components/schemas/CityBaseDataPayload"
            - $ref: "#/components/schemas/AirQualityPayload"
            - $ref: "#/components/schemas/WeatherPayload"
            - $ref: "#/components/schemas/PoiPayload"
            - $ref: "#/components/schemas/TrafficEventPayload"
            - $ref: "#/components/schemas/TransitStopPayload"
            - $ref: "#/components/schemas/ChargingStationPayload"
            - $ref: "#/components/schemas/WaterLevelPayload"
            - $ref: "#/components/schemas/FloodWarningPayload"
            - $ref: "#/components/schemas/PollenUvPayload"
            - $ref: "#/components/schemas/DemographicsPayload"
            - $ref: "#/components/schemas/EnergyAssetPayload"
            - $ref: "#/components/schemas/AdminBoundaryPayload"
            - $ref: "#/components/schemas/ElectionResultPayload"
            - $ref: "#/components/schemas/HolidayPayload"
            - $ref: "#/components/schemas/HospitalPayload"
            - $ref: "#/components/schemas/IcuCapacityPayload"
            - $ref: "#/components/schemas/RoadEventPayload"
            - $ref: "#/components/schemas/WebcamPayload"
          discriminator:
            propertyName: kind
    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: upstream_unavailable
        message:
          type: string
          example: Simulated upstream failure
        hint:
          type: string
          nullable: true
    ErrorEnvelope:
      type: object
      required: [error, meta]
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"
        meta:
          type: object
          properties:
            correlation_id:
              type: string
              nullable: true
            generated_at:
              type: string
              format: date-time
